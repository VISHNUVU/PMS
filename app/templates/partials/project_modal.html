{% macro create_project_modal(all_users) %}
<div id="modal-create-project" class="modal hidden">
  <div class="modal-header">
    <h2 class="modal-title">New Project</h2>
    <button class="modal-close" onclick="closeAllModals()">&times;</button>
  </div>
  <form method="POST" action="/projects/create">
    <div class="form-group">
      <label class="form-label">Project Name <span class="required">*</span></label>
      <input type="text" name="name" class="form-input" placeholder="e.g. MBA Research Initiative" required autofocus />
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-input" rows="3" placeholder="Brief description of the project…"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Deadline</label>
      <input type="date" name="deadline" class="form-input" />
    </div>
    <div class="form-group">
      <label class="form-label">Add Members</label>
      <div class="checkbox-list" id="member-list">
        {% for u in all_users %}
        <label class="checkbox-item">
          <input type="checkbox" name="member_ids" value="{{ u.id }}" />
          <span>{{ u.full_name }} <em>({{ u.username }})</em></span>
        </label>
        {% endfor %}
      </div>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" onclick="closeAllModals()">Cancel</button>
      <button type="submit" class="btn btn-primary">Create Project</button>
    </div>
  </form>
</div>
{% endmacro %}
