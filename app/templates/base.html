<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}EBS PMS{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">E</div>
        <div class="brand-text">
          <span class="brand-name">EBS</span>
          <span class="brand-sub">Project Hub</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="/dashboard" class="nav-item {% if request.url.path == '/dashboard' %}active{% endif %}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="/projects" class="nav-item {% if '/projects' in request.url.path %}active{% endif %}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          Projects
        </a>
        {% if user and user.role == 'admin' %}
        <div class="nav-section">Admin</div>
        <a href="/admin/users" class="nav-item {% if '/admin' in request.url.path %}active{% endif %}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Members
        </a>
        {% endif %}
      </nav>

      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="user-avatar">{{ user.full_name[0] if user else '?' }}</div>
          <div class="user-info">
            <span class="user-name">{{ user.full_name if user else '' }}</span>
            <span class="user-role">{{ user.role | capitalize if user else '' }}</span>
          </div>
        </div>
        <a href="/logout" class="logout-btn" title="Sign out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </a>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <div class="main-inner">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeAllModals()"></div>

  <script src="/static/js/app.js"></script>
</body>
</html>
