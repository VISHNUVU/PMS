{% extends "base.html" %}
{% block title %}Calendar — EBS PMS{% endblock %}
{% block content %}

<div class="page-header">
  <div>
    <h1 class="page-title">Calendar</h1>
    <p class="page-subtitle">Tasks by due date</p>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" id="btn-prev">← Prev</button>
    <span class="calendar-month-label" id="month-label"></span>
    <button class="btn btn-ghost" id="btn-next">Next →</button>
    <button class="btn btn-ghost btn-sm" id="btn-today">Today</button>
  </div>
</div>

<div class="cal-legend">
  <span class="cal-legend-item"><span class="cal-dot priority-high"></span> High</span>
  <span class="cal-legend-item"><span class="cal-dot priority-medium"></span> Medium</span>
  <span class="cal-legend-item"><span class="cal-dot priority-low"></span> Low</span>
  <span class="cal-legend-item"><span class="cal-dot status-done"></span> Done</span>
</div>

<div class="calendar-grid" id="calendar-grid"></div>

<!-- Day popover -->
<div id="cal-popover" class="cal-popover hidden">
  <div class="cal-popover-header">
    <span id="cal-popover-date"></span>
    <button onclick="closeCalPopover()" class="cal-popover-close">&times;</button>
  </div>
  <div id="cal-popover-list"></div>
</div>
<div id="cal-popover-overlay" class="hidden" onclick="closeCalPopover()" style="position:fixed;inset:0;z-index:199"></div>

{% endblock %}
{% block scripts %}
<script>
const EVENTS = {{ events | tojson }};
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let currentYear, currentMonth;

function init() {
  const now = new Date();
  currentYear  = now.getFullYear();
  currentMonth = now.getMonth();
  render();
}

function render() {
  document.getElementById('month-label').textContent = MONTHS[currentMonth] + ' ' + currentYear;
  const grid = document.getElementById('calendar-grid');
  grid.innerHTML = '';

  DAYS.forEach(d => {
    const h = document.createElement('div');
    h.className = 'cal-day-header';
    h.textContent = d;
    grid.appendChild(h);
  });

  const firstDay    = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const today       = new Date();
  const MAX_VISIBLE = 3;

  for (let i = 0; i < firstDay; i++) {
    const blank = document.createElement('div');
    blank.className = 'cal-cell cal-cell-empty';
    grid.appendChild(blank);
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr  = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday  = today.getFullYear()===currentYear && today.getMonth()===currentMonth && today.getDate()===day;
    const dayEvts  = EVENTS.filter(e => e.due === dateStr);

    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (isToday ? ' cal-today' : '');

    const num = document.createElement('div');
    num.className = 'cal-day-num';
    num.textContent = day;
    cell.appendChild(num);

    dayEvts.slice(0, MAX_VISIBLE).forEach(ev => {
      const chip = document.createElement('a');
      chip.href = `/tasks/${ev.id}`;
      chip.className = `cal-event cal-event-${ev.priority}${ev.status==='done' ? ' cal-event-done' : ''}`;
      chip.title = `#${ev.id} ${ev.title} — ${ev.project}`;
      chip.textContent = `#${ev.id} ${ev.title}`;
      cell.appendChild(chip);
    });

    if (dayEvts.length > MAX_VISIBLE) {
      const more = document.createElement('button');
      more.className = 'cal-more-btn';
      more.textContent = `+${dayEvts.length - MAX_VISIBLE} more`;
      more.onclick = (e) => { e.stopPropagation(); openCalPopover(dateStr, dayEvts, more); };
      cell.appendChild(more);
    }

    grid.appendChild(cell);
  }
}

function openCalPopover(dateStr, evts, anchor) {
  const pop = document.getElementById('cal-popover');
  const overlay = document.getElementById('cal-popover-overlay');
  document.getElementById('cal-popover-date').textContent = new Date(dateStr + 'T12:00:00').toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });

  const list = document.getElementById('cal-popover-list');
  list.innerHTML = '';
  evts.forEach(ev => {
    const a = document.createElement('a');
    a.href = `/tasks/${ev.id}`;
    a.className = `cal-popover-item cal-event-${ev.priority}${ev.status==='done'?' cal-event-done':''}`;
    a.innerHTML = `<span class="cal-pop-id">#${ev.id}</span><span class="cal-pop-title">${ev.title}</span><span class="cal-pop-proj">${ev.project}</span>`;
    list.appendChild(a);
  });

  // Position near anchor
  const rect = anchor.getBoundingClientRect();
  pop.style.top  = (rect.bottom + window.scrollY + 6) + 'px';
  pop.style.left = Math.min(rect.left, window.innerWidth - 300) + 'px';

  pop.classList.remove('hidden');
  overlay.classList.remove('hidden');
}

function closeCalPopover() {
  document.getElementById('cal-popover').classList.add('hidden');
  document.getElementById('cal-popover-overlay').classList.add('hidden');
}

document.getElementById('btn-prev').addEventListener('click', () => {
  if (--currentMonth < 0) { currentMonth = 11; currentYear--; }
  render();
});
document.getElementById('btn-next').addEventListener('click', () => {
  if (++currentMonth > 11) { currentMonth = 0; currentYear++; }
  render();
});
document.getElementById('btn-today').addEventListener('click', () => {
  const now = new Date();
  currentYear  = now.getFullYear();
  currentMonth = now.getMonth();
  render();
});

init();
</script>
{% endblock %}
