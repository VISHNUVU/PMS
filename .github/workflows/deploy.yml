name: Deploy EBS PMS to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. SSH into VPS & deploy ──────────────────────────────────
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH || '/opt/PMS' }}"

            # ── Clone repo if first deploy, else pull latest ──────
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo ">>> First deploy — cloning repo..."
              git clone https://github.com/VISHNUVU/PMS.git "$DEPLOY_PATH"
            else
              echo ">>> Pulling latest changes..."
              cd "$DEPLOY_PATH"
              git pull origin main
            fi

            cd "$DEPLOY_PATH"

            # ── Create .env if missing ────────────────────────────
            if [ ! -f ".env" ]; then
              echo ">>> Creating .env from secrets..."
              cat > .env <<EOF
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            EOF
            fi

            # ── Ensure Docker & Docker Compose are installed ──────
            if ! command -v docker &> /dev/null; then
              echo ">>> Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker
              systemctl start docker
            fi

            if ! command -v docker compose &> /dev/null; then
              echo ">>> Installing Docker Compose plugin..."
              apt-get install -y docker-compose-plugin
            fi

            # ── Build & restart containers ────────────────────────
            echo ">>> Building and starting containers..."
            docker compose pull db || true
            docker compose up -d --build --remove-orphans

            # ── Cleanup old images ────────────────────────────────
            echo ">>> Cleaning up dangling images..."
            docker image prune -f

            echo "✅ EBS PMS deployed successfully on port 8080"
